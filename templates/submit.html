{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h1>Submit Report</h1>
    <p class="subtitle">Log your daily activities and progress</p>
</div>

<div class="form-container glass-panel">
    <form method="POST" enctype="multipart/form-data" id="reportForm">
        <div class="form-row">
            <div class="form-group half-width">
                <label for="employee_name">Employee Name</label>
                <input type="text" id="employee_name" name="employee_name" value="{{ current_user.full_name or current_user.username }}" required>
            </div>
            <div class="form-group half-width">
                <label for="department">Department</label>
                <select id="department" name="department" required>
                    <option value="" disabled selected>Select your department</option>
                    {% for dept in departments %}
                    <option value="{{ dept.name }}">{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label for="report_text">Report Details</label>
            <textarea id="report_text" name="report_text" rows="8" required placeholder="Describe your tasks, progress, and any issues..."></textarea>
        </div>
        
        <div class="form-group">
            <label>Attachments (Images)</label>
            <div class="file-upload-wrapper">
                <input type="file" id="images" name="images" accept="image/*" multiple class="file-input">
                <label for="images" class="file-label">
                    <span class="file-icon">📁</span>
                    <span>Click to browse or drag & drop images here (Max 5MB each)</span>
                </label>
            </div>
            <div id="imagePreview" class="image-preview-grid"></div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg">Submit Report</button>
        </div>
    </form>
</div>
{% endblock %}
