{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="auth-card glass-panel">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Login to your account</p>
        <form method="POST" class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.25rem;margin-bottom:1.5rem;">
            <a href="{{ url_for('forgot_password') }}" style="font-size:.85rem;color:var(--muted);">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Log In</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
    </div>
</div>
{% endblock %}
