{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="auth-card glass-panel">
        <h1 class="auth-title">Forgot Password</h1>
        <p class="auth-subtitle">Enter your email to get instructions</p>

        {% if message %}
        <div class="alert alert-info" style="margin-bottom:1.5rem;">{{ message }}</div>
        {% endif %}

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Send Instructions</button>
        </form>

        <div class="auth-footer">
            <a href="{{ url_for('login') }}">← Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
